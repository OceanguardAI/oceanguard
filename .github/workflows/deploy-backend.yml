name: Deploy OceanGuard Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-south1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build container image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t asia-south1-docker.pkg.dev/oceaneyelabs/oceanguard/oceanguard-api:${{ github.sha }} \
            backend

      - name: Push container image
        run: docker push asia-south1-docker.pkg.dev/oceaneyelabs/oceanguard/oceanguard-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: oceanguard-api
          region: asia-south1
          image: asia-south1-docker.pkg.dev/oceaneyelabs/oceanguard/oceanguard-api:${{ github.sha }}
          service_account: oceanguard-runtime@oceaneyelabs.iam.gserviceaccount.com
          env_vars: |
            GEMINI_USE_GCP=true
            GOOGLE_CLOUD_PROJECT=oceaneyelabs
            GOOGLE_CLOUD_LOCATION=global
            GEMINI_MODEL=gemini-3.5-flash
          flags: --allow-unauthenticated
