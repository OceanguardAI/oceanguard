name: Deploy OceanGuard Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  # Manual redeploy with no code change — e.g. to pick up new GitHub Secrets
  # (SENTINELHUB_CLIENT_ID/SECRET) without a dummy commit.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REGISTRY_REGION: ${{ vars.ARTIFACT_REGISTRY_REGION }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  BACKEND_IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
  GEMINI_GCP_LOCATION: ${{ vars.GEMINI_GCP_LOCATION }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
  CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build container image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            backend

      - name: Push container image
        run: docker push ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      # deploy-cloudrun@v3 does not accept env_vars_file as an input — pass
      # --env-vars-file directly via gcloud flags instead. Writing to a YAML
      # file avoids the comma-delimiter bug in the action's env_vars input,
      # which truncated GFW_REGION_BBOX=[79.4,8.0,...] to "[79.4".
      - name: Write Cloud Run env file
        run: |
          cat > cloudrun-env.yaml <<'EOF'
          GEMINI_USE_GCP: "true"
          GOOGLE_GENAI_USE_VERTEXAI: "True"
          GOOGLE_CLOUD_PROJECT: "${{ vars.GCP_PROJECT_ID }}"
          GOOGLE_CLOUD_LOCATION: "${{ vars.GEMINI_GCP_LOCATION }}"
          GEMINI_MODEL: "${{ vars.GEMINI_MODEL }}"
          CORS_ORIGINS: "${{ vars.CORS_ORIGINS }}"
          GFW_API_TOKEN: "${{ secrets.GFW_API_TOKEN }}"
          AISSTREAM_API_KEY: "${{ secrets.AISSTREAM_API_KEY }}"
          GFW_REGION_BBOX: "[-180,-90,180,90]"
          GFW_LOOKBACK_DAYS: "7"
          GFW_MAX_EVENTS: "600"
          GFW_INGEST_ON_STARTUP: "true"
          SENTINELHUB_CLIENT_ID: "${{ secrets.SENTINELHUB_CLIENT_ID }}"
          SENTINELHUB_CLIENT_SECRET: "${{ secrets.SENTINELHUB_CLIENT_SECRET }}"
          YOLO_SERVICE_URL: "${{ vars.YOLO_SERVICE_URL }}"
          EOF

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.CLOUD_RUN_REGION }}
          image: ${{ vars.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          # 1Gi/1CPU: the global WDPA MPA index + GFW SAR report need more than
          # the 512Mi default. --no-cpu-throttling keeps the CPU allocated so the
          # *background* ingest thread (index build + SAR scoring) runs at full
          # speed instead of being throttled to a crawl after startup; instances
          # still scale to zero when idle. Health passes before data loads.
          flags: '--service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }} --allow-unauthenticated --env-vars-file=cloudrun-env.yaml --memory=1Gi --cpu=1 --no-cpu-throttling'
